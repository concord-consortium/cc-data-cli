name: Release

# Before the first tagged release, confirm the Apple Developer ID Application
# certificate and App Store Connect API key exist and are set as the secrets
# below (Admin/Account Holder access required to create them).
#
# Required secrets:
#   MACOS_SIGN_IDENTITY (the "Developer ID Application: ..." identity codesign uses)
#   MACOS_CERT_P12 (base64 of the Developer ID cert + private key, exported as .p12)
#   MACOS_CERT_PASSWORD (the .p12 export password)
#   AC_API_KEY (base64 .p8), AC_API_KEY_ID, AC_API_ISSUER (App Store Connect notarization key)
#   HOMEBREW_TAP_TOKEN (repo-scoped push token for concord-consortium/homebrew-tap)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Gate the whole release on the test suite so a tag whose tests fail cannot
  # build or publish. Mirrors ci.yml's test step (go test ./...).
  test:
    name: test
    runs-on: ubuntu-24.04
    env:
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Test
        run: go test ./...

  build:
    name: build (${{ matrix.target }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin_arm64
            os: macos-15
            goos: darwin
            goarch: arm64
            macos: true
          - target: darwin_amd64
            os: macos-15-intel
            goos: darwin
            goarch: amd64
            macos: true
          - target: linux_amd64
            os: ubuntu-24.04
            goos: linux
            goarch: amd64
            macos: false
    env:
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Render per-platform goreleaser config
        run: scripts/gen-goreleaser.sh ${{ matrix.goos }} ${{ matrix.goarch }} .goreleaser.${{ matrix.target }}.yaml

      - name: Prepare macOS notarization key
        if: matrix.macos
        run: |
          echo "${{ secrets.AC_API_KEY }}" | base64 --decode > "$RUNNER_TEMP/ac_api_key.p8"
          echo "AC_API_KEY_PATH=$RUNNER_TEMP/ac_api_key.p8" >> "$GITHUB_ENV"

      # The notarization key above only authenticates the Apple submission; codesign
      # still needs the Developer ID cert + private key in a keychain. Import them
      # into a throwaway keychain and add it to the search list so codesign can find
      # the identity by name. Without this step codesign fails with "no identity found".
      - name: Import Developer ID signing certificate
        if: matrix.macos
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PW="$(uuidgen)"
          echo "$MACOS_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          # Keep it unlocked for the whole job (default relocks after 5 minutes idle).
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          # Allow codesign to use the private key without an interactive UI prompt.
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          # Prepend the signing keychain to the search list so codesign resolves the identity.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          rm -f "$RUNNER_TEMP/cert.p12"
          security find-identity -v -p codesigning "$KEYCHAIN"

      - name: Build, sign, notarize, archive
        env:
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER: ${{ secrets.AC_API_ISSUER }}
        run: |
          go run github.com/goreleaser/goreleaser/v2@latest release \
            --clean --skip=publish -f .goreleaser.${{ matrix.target }}.yaml

      - name: Fail the tag if a macOS artifact was left unsigned
        if: matrix.macos
        run: |
          if find dist -name ".notarize-unsigned" | grep -q .; then
            echo "a macOS artifact was not signed; failing the release" >&2
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*_checksums.txt
            dist/*.sha256
          if-no-files-found: error

  publish:
    name: publish release + formula
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Verify checksums
        run: |
          cd dist
          shopt -s nullglob
          manifests=(*.sha256)
          if [[ ${#manifests[@]} -eq 0 ]]; then
            echo "no checksum manifests (*.sha256) found in dist; refusing to publish" >&2
            exit 1
          fi
          # shasum -c recomputes each tarball's sha256 and fails on any mismatch or
          # missing file. Under the default -eo pipefail shell a failure aborts here.
          for m in "${manifests[@]}"; do
            echo "verifying ${m}"
            shasum -a 256 -c "${m}"
          done

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Attach the checksum manifests alongside the tarballs so consumers can
          # verify downloads independently.
          gh release create "${GITHUB_REF_NAME}" dist/*.tar.gz dist/*.sha256 \
            --title "${GITHUB_REF_NAME}" --generate-notes

      - name: Render and push the Homebrew formula
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: scripts/render-formula.sh "${GITHUB_REF_NAME}"
