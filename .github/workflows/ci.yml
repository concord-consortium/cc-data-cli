name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    name: build+test (${{ matrix.os }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64
          - os: macos-15
            arch: arm64
          - os: macos-15-intel
            arch: amd64
          - os: windows-2022
            arch: amd64
    env:
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # cgo + the bundled DuckDB static libs build natively per runner; there is
      # no cross-compilation.
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
